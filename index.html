<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>OracleAI - Asistente Técnico Profesional</title>
  <style>
   root {
      --bg: #FAFAF9; /* Fondo crema claro, como Claude */
      --surface: #FFFFFF;
      --text: #1D1D1F; /* Negro profundo */
      --text-secondary: #86868B; /* Gris secundario */
      --border: #E5E5EA; /* Gris de borde sutil */
      --primary: #007AFF; /* Azul Apple/Profesional */
      --primary-light: #EBF5FF;
      --primary-dark: #0056CC;
      --assistant-bg: #F2F2F7; /* Gris muy claro para mensajes del bot */
      --user-bg: #007AFF; /* Azul para mensajes del usuario */
      --user-text: #FFFFFF;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      height: 90vh;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items;
      gap: 16px;
      background-color: var(--surface);
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), #5856D6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 1.2rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow: hidden;
      background-color: var(--bg); /* Fondo del chat igual al body */
    }

    .history {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background-color: var(--bg);
    }

    .message {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.45;
      font-family: inherit;
      font-size: 0.95rem;
      box-shadow: var(--shadow);
    }

    .user-message {
      background-color: var(--user-bg);
      color: var(--user-text);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .assistant-message {
      background-color: var(--assistant-bg);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background-color: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    textarea {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      resize: none;
      font-family: inherit;
      font-size: 1rem;
      min-height: 60px;
      max-height: 150px;
      background-color: var(--surface);
      color: var(--text);
      line-height: 1.45;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .attachment-buttons {
      display: flex;
      gap: 8px;
    }

    .attach-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background-color: var(--surface);
      color: var(--text-secondary);
      display: flex;
      align-items center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      font-size: 1.1rem;
    }

    .attach-btn:hover {
      background-color: var(--primary-light);
      color: var(--primary);
    }

    #fileInput {
      display: none;
    }

    .send-button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background-color: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s,0.1s;
      font-size: 1.2rem;
    }

    .send-button:hover {
      background-color: var(--primary-dark);
    }

    .send-button:active {
      transform: scale(0.95);
    }

    /* --- BARRA DE HABILIDADES (como en la imagen) --- */
    .skills-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .skill-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background-color: var(--surface);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .skill-btn:hover {
      background-color: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }

    .skill-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* --- ICONOS SVG INTEGRADOS --- */
    .icon-code {
      fill: currentColor;
    }
    .icon-pencil {
      fill: currentColor;
    }
    .icon-graduation {
      fill: currentColor;
    }
    .icon-coffee {
      fill: currentColor;
    }
    .icon-bulb {
      fill: currentColor;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="logo">O</div>
      <div>
        <h1>OracleAI</h1>
        <div class="subtitle">Beta 1.0 - ¿En qué puedo ayudarte hoy?</div>
      </div>
    </header>

    <div class="chat-container">
      <div id="historyContainer" class="history">
        <div class="message-message">
          Hola, soy OracleAI. ¿En qué puedo ayudarte hoy? (ej: Crea un plugin de Minecraft, configura un panel, etc.)
        </div>

        <div class="skills-bar">

            <svg class="icon-code" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-44 4-4"/></svg>

          </button>
        </div>

        <div class="input-row">

        </div>
      </div>

      <div id="responseContainer"></div>
    </div>
  </div>

  <script>
    // --- Función para insertar texto en el textarea ---
    function insertText(text) {
      const textarea = document.getElementById('questionInput');
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const value = textarea.value;
      textarea.value = value.substring(0, start) + text + value.substring(end);
      textarea.focus();
      // Mover el cursor al final del texto insertado
      textarea.setSelectionRange(start + text.length, start + text.length);
    }

    // --- Manejo de Archivos y Cámara ---
    let imagenAdjunta = null;

    document.getElementById('fileInput').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          imagenAdjunta = e.target.result;
          console.logunta:", file.name);
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('cameraButton').addEventListener('click', function() {
      const cameraInput = document.createElement('input');
      cameraInput.type = 'file';
      cameraInput.accept = 'image/*';
      cameraInput.capture = 'environment';
      cameraInput.onchange = function(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            imagenAdjunta = e.target.result;
            console.log("Imagen tomada con cámara");
          };
          reader.readAsDataURL(file);
        }
      };
      cameraInput.click();
    });

    // --- FUNCIÓN DE ENVIAR PREGUNTA ---
    let sessionId = null;
    if (!sessionId) {
        sessionId = localStorage.getItem('oracleai_session') || Date.now().toString();
        localStorage.setItem('oracleai_session', sessionId);
    }

    async function enviarPregunta() {
      const input = document.getElementById('questionInput');
      const container = document.getElementById('responseContainer');
      const pregunta = input.value.trim();

      if (!pregunta) {
        alert("Por favor, escribe un mensaje.");
        return;
      }

      const datosEnviar = {
        pregunta: pregunta,
        sessionId: sessionId
      };

      if (imagenAdjunta) {
        datosEnviar.imagen = imagenAdjunta;
      }

      container.innerHTML = '<div class="loading">OracleAI está pensando...</div>';

      try {
        const response = await fetch('/api/puntar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(datosEnviar)
        });

        const data = await response.json();

        if (response.ok) {
          container.innerHTML = '';
          const historyDiv = document.getElementById('historyContainer');

          const userMsgDiv = document.createElement('div');
          userMsgDiv.classList.add('message', 'user-message');
          userMsgDiv.textContent = pregunta;
          historyDiv.appendChild(userMsgDiv);

          if (imagenAdjunta) {
            const imgPreview = document.createElement('img');
            imgPreview.src = imagenAdjunta;
            imgPreview.style.maxWidth = '200px';
            imgPreview.style.borderRadius = '8px';
            imgPreview.style.marginTop = '5px';
            userMsgDiv.appendChild(imgPreview);
          }

          const assistantMsgDiv = document.createElement('div');
          assistantMsgDiv.classList.add('message', '¡Perfecto! Ahora entiendo **exactamente** lo que quieres.

La imagen que compartiste es de **Claude by Anthropic**, y su diseño es un ejemplo de **minimalismo profesional, elegante y moderno**:

            <svg class="icon-bulb" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm-1-13h-2v5H7v2h2v7h2v-7h2V9h-2V7z"/></svg>
            Selección de Oracle
          </button>
        </div>

        <div class="input-row">
          <label for="fileInput" class="attach-btn" title="Adjuntar Imagen">📎</label>
          <button id="cameraButton" class="attach-btn" title="Usar Cámara">📷</button>
          <button class="send-button" onclick="enviarPregunta()" title="Enviar">➤</button>
        </div>
      </div>

      <div id="responseContainer"></div>
    </div>
  </div>

  <script>
    // --- Función para insertar texto en el textarea ---
    function insertText(text) {
      const textarea = document.getElementById('questionInput');
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const value = textarea.value;
      textarea.value = value.substring(0, start) + text + value.substring(end);
      textarea.focus();
      // Mover el cursor al final del texto insertado
      textarea.setSelectionRange(start + text.length, start + text.length);
    }

    // --- Manejo de Archivos y Cámara ---
    let imagenAdjunta = null;

    document.getElementById('fileInput').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          imagenAdjunta = e.target.result;
          console.logunta:", file.name);
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('cameraButton').addEventListener('click', function() {
      const cameraInput = document.createElement('input');
      cameraInput.type = 'file';
      cameraInput.accept = 'image/*';
      cameraInput.capture = 'environment';
      cameraInput.onchange = function(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            imagenAdjunta = e.target.result;
            console.log("Imagen tomada con cámara");
          };
          reader.readAsDataURL(file);
        }
      };
      cameraInput.click();
    });

    // --- FUNCIÓN DE ENVIAR PREGUNTA ---
    let sessionId = null;
    if (!sessionId) {
        sessionId = localStorage.getItem('oracleai_session') || Date.now().toString();
        localStorage.setItem('oracleai_session', sessionId);
    }

    async function enviarPregunta() {
      const input = document.getElementById('questionInput');
      const container = document.getElementById('responseContainer');
      const pregunta = input.value.trim();

      if (!pregunta) {
        alert("Por favor, escribe un mensaje.");
        return;
      }

      const datosEnviar = {
        pregunta: pregunta,
        sessionId: sessionId
      };

      if (imagenAdjunta) {
        datosEnviar.imagen = imagenAdjunta;
      }

      container.innerHTML = '<div class="loading">OracleAI está pensando...</div>';

      try {
        const response = await fetch('/api/puntar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(datosEnviar)
        });

        const data = await response.json();

        if (response.ok) {
          container.innerHTML = '';
          const historyDiv = document.getElementById('historyContainer');

          const userMsgDiv = document.createElement('div');
          userMsgDiv.classList.add('message', 'user-message');
          userMsgDiv.textContent = pregunta;
          historyDiv.appendChild(userMsgDiv);

          if (imagenAdjunta) {
            const imgPreview = document.createElement('img');
            imgPreview.src = imagenAdjunta;
            imgPreview.style.maxWidth = '200px';
            imgPreview.style.borderRadius = '8px';
            imgPreview.style.marginTop = '5px';
            userMsgDiv.appendChild(imgPreview);
          }

          const assistantMsgDiv = document.createElement('div');
          assistantMsgDiv.classList.add('message', 'assistant-message');
          assistantMsgDiv.textContent = data.respuesta;
          historyDiv.appendChild(assistantMsgDiv);

          historyDiv.scrollTop = historyDiv.scrollHeight;
          input.value = '';
          imagenAdjunta = null;
          document.getElementById('fileInput').value = '';
        } else {
          container.innerHTML = `<div class="response-error">Error: ${data.error}</div>`;
        }
      } catch (error) {
        container.innerHTML = `<div class="response-error">Error de conexión: ${error.message}</div>`;
      }
    }
  </script>

</body>
</html>
