<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OcladeAI - Beta 1.0</title>
  <style>
    :root {
      --primary: #6366f1; /* Indigo */
     primary-light: #e0e7ff;
      --primary-dark: #4f46e5;
      --text: #e0e7ff;
      --text-secondary: #94a3b8;
      --surface: rgba(15, 23, 42, 0.7); /* Fondo oscuro con transparencia */
      --border: #374151;
      --assistant-bg: rgba(30, 41, 59, 0.6);
      --user-bg: var(--primary);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #0f172a;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* --- FONDO DEÍCULAS ÉPICO --- */
    #particles-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* --- LOGO ANIMADO --- */
logo-container {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-text {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #8b5cf6, #0ea5e9, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s forwards;
    }

    .logo-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 1.2s forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
       : translateY(0      }
    }

    /* --- CONTENEDOR PRINCIPAL --- */
    .container {
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      z-index: 1;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .history {
      flex;
      overflow-y: auto;
      padding: 20px;
      border-radius: 12px;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
    }

    .message {
      padding: 14px 18px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
      font-family: 'Consolas', monospace;
      font-size: 0.95rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .user-message {
      background: var(--user-bg);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .assistant-message {
      background: var(--assistant-bg);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    textarea {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      resize: vertical;
      font-family: inherit;
      font-size: 1rem;
      min-height: 80px;
      background: rgba(30, 41, 59, 0.5);
      color: var(--text);
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .skills-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .skill-btn {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(30, 41, 59, 0.5);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .skill-btn:hover {
      background: var(--primary-light);
      color: var(--primary-dark);
      border-color: var(--primary);
    }

    .attachment-row {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .attach-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(30, 41, 59, 0.5);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1.2rem;
    }

    .attach-btn:hover {
      background: var(--primary-light);
      color: var(--primary);
    }

    #fileInput {
      display: none;
    }

    .send-button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1.4rem;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .send-button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
    }

    .loading {
      color: var(--text-secondary);
      font-style: italic;
      padding: 10px;
      font-size: 0.9rem;
    }

    .response-error {
      color: #f87171;
      padding: 12px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid #f87171;
      border-radius: 12px;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      .logo-text { font-size: 2rem; }
      .container { padding: 16px; }
      .history { padding: 16px; }
      .message { padding: 12px 14px; font-size: 0.9 }
      .attachment-row { justify-content: space-between; }
      .send-button { width: 44px; height: 44px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- Canvas para partículas -->
  <canvas id="particles-canvas"></canvas>

  <div class="container">
    <div class="logo-container">
      <h1 class="logo-text">OcladeAI</h1>
      <div class="logo-subtitle">Beta 1.0 — ¿En qué puedo ayudarte hoydiv>
    </div>

    <div class="chat-container">
      <div id="historyContainer" class="history">
        <div class="message assistant-message">
          Hola, soy OcladeAI. ¿En qué puedo ayudarte hoy? (ej: Crea un plugin de Minecraft, configura un panel, etc.)
        </div>
      </div>

      <div class="input-area">
        <textarea id="questionInput" placeholder="Escribe / para habilidades..."></textarea>

        <div class="skills-bar">
          <button class="skill-btn" onclick="insertText('<></> Código')">
            <span><> </span>Código
          </button>
          <button class="skill-btn" onclick="insertText('✏️ Escribir')">
            <span>✏️ </span>Escribir
          </button>
          <button class="skill-btn" onclick="insertText('✅ Aprender')">
            <span>✅ </span>Aprender
          </          <button class="skill-btn" onclick="insertText('☕ Vida personal')">
            <span>☕ </span>Vida personal
          </button>
          <button class="skill-btn" onclick="insertText('💡 Selección de Oclade')">
            <span>💡 </span>Selección de Oclade
          </button>
        </div>

        <div class="attachment-row">
          <label for="fileInput" class="attach-btn" title="Adjuntar Imagen">📎</label>
          <button id="cameraButton" class="attach-btn" title="Usar Cámara">📷</button>
          <button class="send-button" onclick="enviarPregunta()">➤</button>
        </div>
      </div>

      <div id="responseContainer"></div>
    </div>
  </div>

  <script>
    // --- ANIMACIÓN DE PARTÍCULAS ÉPICA (Canvas 2D) ---
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');

      // Ajustar tamaño del canvas al viewport
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize      resizeCanvas();

      // Configuración de partículas
      const particles = [];
      const particleCount = 80;
      const colors = ['#8b5cf6', '#0ea5e9', '#10b981', '#f59e0b', '#ef4444'];

      // Crear partículas
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2 + 1,
          color: colors[Math.floor(Math.random() * colors.length)],
          speedX: (Math.random() - 0.5) * 2,
          speedY: (Math.random() - 0.5) * 2,
          alpha: Math.random() * 0.5 + 0.2,
          life: Math.random() * 100 + 50
        });
      }

      // Animar partículas
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
          // Actualizar posición
          p.x += p.speedX;
          p.y += p.speedY;

 // Reb en bordes (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
          if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

          // Dibujar partícula
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${parseInt(p.color.slice(1, 3), 16)}, ${parseInt(p.color.slice(3, 5), 16)}, ${parseInt(p.color.slice(5, 7), 16)}, ${p.alpha})`;
          ctx.fill();

          // Reducir vida y reaparecer si muere
          p.life--;
          if (p.life <= 0) {
            p.x = Math.random() * canvas.width;
            p.y = Math.random() * canvas.height;
            p.life = Math.random() * 100 + 50;
          }
        });

        requestAnimationFrame(animate);
      }

      animate();

      // --- FUNCIONES DE INTERACCIÓN ---
      let imagenAdjunta = null;

      document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file && file.type.startsWith('')) {
          const reader = new FileReader();
          reader.onload = function(e) {
            imagenAdjunta = e.target.result;
            console.log("Imagen adjunta:", file.name);
          };
          reader.readAsDataURL(file);
        }
      });

      document.getElementById('cameraButton').addEventListener('click', function() {
        const cameraInput = document.createElement('input');
        cameraInput.type = 'file';
        cameraInput.accept = 'image/*';
        cameraInput.capture = 'environment';
        camera.onchange = function(event) {
          const file = event.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
              imagenAdjunta = e.target.result;
              console.log("Imagen tomada con cámara");
            };
            reader.readAsDataURL(file);
          }
        };
        cameraInput.click();
      });

      function insertText(text) {
        const textarea = document.getElementById('questionInput');
        textarea.value += text + ' ';
        textarea.focus();
      }

      let sessionId = null;
      if (!sessionId) {
        sessionId = localStorage.getItem('ocladeai_session') || Date.now().toString();
        localStorage.setItem('ocladeai_session', sessionId);
      }

      async function enviarPregunta() {
        const input = document.getElementById('questionInput');
        const container = document.getElementById('responseContainer');
        const pregunta = input.value.trim();

        if (!pregunta) {
          alert("Por favor, escribe un mensaje.");
          return;
        }

        const datosEnviar = { pregunta, sessionId };
        if (imagenAdjunta) datosEnviar.imagen = imagenAdjunta;

        container.innerHTML = '<div class="loading">OcladeAI está procesando tu solicitud...</div>';

        try {
          const response = await fetch('/api/preguntar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datosEnviar)
          });

          const data = await response.json();

          if (response.ok) {
            container.innerHTML = '';
            const historyDiv = document.getElementById('historyContainer');

            const userMsgDiv = document.createElement('div');
            userMsgDiv.classList.add('message', 'user-message');
            userMsgDiv.textContent = pregunta;
            historyDiv.appendChild(userMsgDiv);

            if (imagenAdjunta) {
              const imgPreview = document.createElement('img');
              imgPreview.src = imagenAdjunta;
              imgPreview.style.maxWidth = '200px';
              imgPreview.style.borderRadius = '8px';
              imgPreview.style.marginTop = '5px';
             Div.appendChild(imgPreview);
            }

            const assistantMsgDiv = document.createElement('div');
            assistantMsgDiv.classList.add('message', 'assistant-message');
            assistantMsgDiv.textContent = data.respuesta;
            historyDiv.appendChild(assistantMsgDiv);

            historyDiv.scrollTop = historyDiv.scrollHeight;
            input.value = '';
            imagenAdjunta = null;
            document.getElementById('fileInput').value = '';
          } else {
            container.innerHTML = `<div class="response-error">Error: ${data.error}</div>`;
          }
        } catch (error) {
          container.innerHTML = `<div class="response-error">Error de conexión: ${error.message}</div>`;
        }
      }
    });
  </script>

</body>
</html>
